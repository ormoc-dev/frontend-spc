<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description"
        content="SmartPath Cane - Advanced navigation technology with real-time tracking and emergency alerts for enhanced mobility and safety.">
    <meta name="theme-color" content="#2563eb">

    <title>SmartPath Cane - Smart Navigation for Everyone</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦯</text></svg>">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS support -->
    <link rel="apple-touch-icon" href="assets/images/icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="SmartPath">

    <!-- Google Fonts - non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css?v=17">

    <!-- Leaflet CSS (non-blocking) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">

    <!-- CONFIG: MUST be inline so it's never missing from cache -->
    <script>
        // Global error handler - catches errors before app loads
        window.onerror = function (msg, url, line) {
            var el = document.getElementById('loading-status');
            if (el) { el.style.color = '#e11d48'; el.textContent = 'Error: ' + msg + ' (L' + line + ')'; }
            console.error('App Error:', msg, url, line);
        };

        // Inline CONFIG - never cached separately
        (function () {
            var h = window.location.hostname;
            var local = h === 'localhost' || h === '127.0.0.1' ||
                h.indexOf('192.168.') === 0 || h.indexOf('10.') === 0 ||
                h.indexOf('.local') !== -1;
            window.CONFIG = {
                ENV: local ? 'development' : 'production',
                API_URL: local
                    ? 'http://' + h + '/smartpathcane/backend-spc/public'
                    : 'https://floralwhite-raccoon-333018.hostingersite.com/backend-spc/public',
                APP_NAME: 'SmartPath Cane',
                VERSION: '1.0.6',
                CACHE_DURATION: 300000,
                MAX_RETRIES: 3,
                TIMEOUT: 10000
            };
            console.log('[CONFIG] ENV:', window.CONFIG.ENV, '| API:', window.CONFIG.API_URL);
        })();
    </script>
</head>

<body>
    <!-- App Container -->
    <div id="app">
        <div class="loading-screen">
            <div class="spinner"></div>
            <p id="loading-status">Loading SmartPath Cane...</p>
        </div>
    </div>

    <!-- 
        ALL JS AT BOTTOM OF BODY - avoids render blocking
        Scripts load after HTML is parsed and shown to user
    -->

    <!-- Leaflet JS - async so it doesn't block -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- API Client -->
    <script src="js/api.js?v=7"></script>

    <!-- App Modules -->
    <script src="assets/js/ui.js?v=15"></script>
    <script src="assets/js/maps.js?v=23"></script>
    <script src="assets/js/auth.js?v=15"></script>
    <script src="assets/js/dashboard.js?v=23"></script>

    <!-- Main App -->
    <script src="assets/js/app.js?v=17"></script>

    <!-- Watchdog & SW Registration -->
    <script>
        // Watchdog: if still loading after 5s, show help buttons
        setTimeout(function () {
            var screen = document.querySelector('.loading-screen');
            if (screen && screen.offsetParent !== null) {
                var el = document.getElementById('loading-status');
                if (el) {
                    el.innerHTML = 'Taking too long...<br>' +
                        '<div style="margin-top:12px;display:flex;gap:8px;justify-content:center">' +
                        '<button onclick="location.reload(true)" style="padding:10px 18px;background:#2563eb;color:#fff;border:none;font-size:14px;">Reload</button>' +
                        '<button onclick="nukePWA()" style="padding:10px 18px;background:#111;color:#fff;border:none;font-size:14px;">Clear Cache</button>' +
                        '</div>';
                }
            }
        }, 5000);

        function nukePWA() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function (regs) {
                    regs.forEach(function (r) { r.unregister(); });
                    if ('caches' in window) {
                        caches.keys().then(function (keys) {
                            keys.forEach(function (k) { caches.delete(k); });
                            alert('Cache cleared! Reloading...');
                            location.href = location.href + '?nocache=' + Date.now();
                        });
                    } else {
                        location.reload(true);
                    }
                });
            } else {
                location.reload(true);
            }
        }

        // Service Worker registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('sw.js')
                    .then(function () { console.log('[SW] Registered'); })
                    .catch(function (e) { console.warn('[SW] Error:', e); });
            });
        }
    </script>
</body>

</html>

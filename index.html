    <style>
        /* Premium Centered Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 24px;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        .loading-container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 320px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.55, 0.1, 0.15, 0.9) infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #loading-status {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        #loading-hint {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            min-height: 20px;
        }
    </style>

    <!-- CONFIG: MUST be inline so it's never missing from cache -->
    <script>
        // Global error handler - catches errors before app loads
        window.onerror = function (msg, url, line) {
            var el = document.getElementById('loading-status');
            if (el) {
                el.style.color = '#e11d48';
                // More detailed error for MIME type issues
                if (msg.indexOf('MIME type') !== -1) {
                    el.innerHTML = '<span style="font-weight:600">PWA Loading Error</span><br>' +
                        '<span style="font-size:12px;opacity:0.8">Unsupported MIME type. This usually means a script was not found and the server returned a 404 page instead.</span>';
                } else {
                    el.textContent = 'Error: ' + msg + ' (L' + line + ')';
                }
            }
            console.error('App Error:', msg, url, line);
        };

        // Inline CONFIG - never cached separately
        (function () {
            var h = window.location.hostname;
            var local = h === 'localhost' || h === '127.0.0.1' ||
                h.indexOf('192.168.') === 0 || h.indexOf('10.') === 0 ||
                h.indexOf('.local') !== -1;
            window.CONFIG = {
                ENV: local ? 'development' : 'production',
                API_URL: local
                    ? 'http://' + h + '/smartpathcane/backend-spc/public'
                    : 'https://floralwhite-raccoon-333018.hostingersite.com/backend-spc/public',
                SUPABASE_URL: 'https://ksoukgxagrpaleedqqua.supabase.co',
                SUPABASE_KEY: 'sb_publishable_Ku5jRYPcCchUGsET6gRNBw_wzqfFQg7',
                APP_NAME: 'SmartPath Cane',
                VERSION: '1.0.9',
                CACHE_DURATION: 300000,
                MAX_RETRIES: 3,
                TIMEOUT: 10000
            };
            console.log('[CONFIG] ENV:', window.CONFIG.ENV, '| API:', window.CONFIG.API_URL);
        })();
    </script>
</head>

<body>
    <!-- App Container -->
    <div id="app">
        <div class="loading-screen">
            <div class="loading-container">
                <div class="spinner"></div>
                <div id="loading-status">SmartPath Cane</div>
                <div id="loading-hint">Initializing security...</div>
            </div>
        </div>
    </div>

    <!-- Watchdog & PWA Rescue - Move high so it runs even if scripts hang -->
    <script>
        // Diagnostic hint
        setTimeout(function () {
            var hint = document.getElementById('loading-hint');
            if (hint) hint.style.display = 'block';
        }, 2000);

        // Watchdog: if still loading after 8s, show help buttons
        setTimeout(function () {
            var screen = document.querySelector('.loading-screen');
            if (screen && screen.offsetParent !== null) {
                var el = document.getElementById('loading-hint');
                if (el) {
                    el.style.color = '#111';
                    el.innerHTML = '<span style="color:#e11d48;font-weight:600">App Initialization Stalled</span><br>' +
                        '<p style="font-size:13px;margin:8px 0 16px;opacity:0.8;max-width:280px;line-height:1.4">This usually happens on local mobile connections or if the cache is corrupted.</p>' +
                        '<div style="display:flex;flex-direction:column;gap:8px;align-items:center">' +
                        '<button onclick="location.reload(true)" style="width:100%;max-width:200px;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">Retry Connection</button>' +
                        '<button onclick="nukePWA()" style="width:100%;max-width:200px;padding:10px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;opacity:0.8">Reset & Clear Cache</button>' +
                        '</div>';
                }
            }
        }, 8000);

        function nukePWA() {
            if (confirm('This will clear the app cache and reset the connection. Continue?')) {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function (regs) {
                        regs.forEach(function (r) { r.unregister(); });
                        if ('caches' in window) {
                            caches.keys().then(function (keys) {
                                Promise.all(keys.map(function (k) { return caches.delete(k); })).then(function () {
                                    location.href = window.location.origin + window.location.pathname + '?reset=' + Date.now();
                                });
                            });
                        } else {
                            location.reload(true);
                        }
                    });
                } else {
                    location.reload(true);
                }
            }
        }
    </script>

    <!-- 
        ALL JS AT BOTTOM OF BODY - avoids render blocking
        Scripts load after HTML is parsed and shown to user
    -->

    <!-- Leaflet JS - async so it doesn't block -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- Dashboard Orchestrator -->

    <!-- Service Worker registration -->
    <script>
        if ('serviceWorker' in navigator) {
            // Register immediately to ensure assets are cached ASAP
            navigator.serviceWorker.register('sw.js')
                .then(function () { console.log('[SW] Registered'); })
                .catch(function (e) {
                    console.warn('[SW] Error:', e);
                    // Show specific SW error on screen if registration fails
                    var el = document.getElementById('loading-hint');
                    if (el) el.textContent = 'PWA Error: ' + e.message;
                });
        }
    </script>
</body>

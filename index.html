<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description"
        content="SmartPath Cane - Advanced navigation technology with real-time tracking and emergency alerts for enhanced mobility and safety.">
    <meta name="theme-color" content="#2563eb">

    <script>
        // Early Error Catcher - Must be ES5
        window.onerror = function (msg, url, line, col, error) {
            var statusBox = document.getElementById('loading-status');
            if (statusBox) {
                statusBox.style.color = '#e11d48';
                statusBox.innerHTML = 'Critical Error: ' + msg + ' (Line: ' + line + ')';
            }
            console.error('PWA Error:', msg, 'at', url, ':', line);
            return false;
        };
    </script>

    <title>SmartPath Cane - Smart Navigation for Everyone</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦯</text></svg>">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS support -->
    <link rel="apple-touch-icon" href="assets/images/icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="SmartPath">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css?v=16">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Configuration -->
    <script src="js/config.js?v=6"></script>
    <script src="js/api.js?v=5"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Modular JS -->
    <script src="assets/js/ui.js?v=14"></script>
    <script src="assets/js/maps.js?v=22"></script>
    <script src="assets/js/auth.js?v=14"></script>
    <script src="assets/js/dashboard.js?v=22"></script>
</head>

<body>
    <!-- App Container -->
    <div id="app">
        <!-- Content will be rendered by app.js -->
        <div class="loading-screen">
            <div class="spinner"></div>
            <p id="loading-status">Loading SmartPath Cane...</p>
        </div>
    </div>

    <!-- Main Application Script -->
    <script src="assets/js/app.js?v=16"></script>

    <!-- Watchdog & Debug -->
    <script>
        // Watchdog for mobile hangs - ES5
        setTimeout(function () {
            var loadingScreen = document.querySelector('.loading-screen');
            if (loadingScreen && loadingScreen.offsetParent !== null) {
                var statusBox = document.getElementById('loading-status');
                if (statusBox) {
                    statusBox.innerHTML += '<br><div style="margin-top:10px">' +
                        '<button onclick="location.reload(true)" style="padding:8px 15px; background:#2563eb; color:white; border:none; margin-right:5px;">Reload</button>' +
                        '<button onclick="clearPWACache()" style="padding:8px 15px; background:#000; color:white; border:none;">Clear Cache</button>' +
                        '</div>';
                }
            }
        }, 4000);

        function clearPWACache() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function (registrations) {
                    for (var i = 0; i < registrations.length; i++) {
                        registrations[i].unregister();
                    }
                    caches.keys().then(function (names) {
                        for (var name of names) caches.delete(name);
                        alert('Cache cleared. Reloading...');
                        window.location.reload(true);
                    });
                });
            } else {
                window.location.reload(true);
            }
        }
    </script>

    <!-- Initialize -->
    <script>
        // Log environment info - ES5
        console.log('SmartPath Cane Loading...');
        if (window.CONFIG) {
            console.log('Environment:', CONFIG.ENV);
            console.log('API URL:', CONFIG.API_URL);
        } else {
            console.error('CONFIG NOT FOUND AT INIT');
            document.getElementById('loading-status').innerHTML = '<b style="color:red">CONFIG ERROR: Check config.js load order</b>';
        }

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('sw.js?v=3')
                    .then(function (reg) { console.log('SW Registered'); })
                    .catch(function (err) { console.log('SW Error: ' + err); });
            });
        }
    </script>
</body>

</html>

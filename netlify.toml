# Netlify Free Tier Configuration
# No build command needed for static HTML/CSS/JS

[build]
  publish = "."

# No catch-all "/* -> index.html" rewrite: it can cause HTML to be served for missing
# static files; the service worker then caches that as JS/CSS and the app never boots.
# This site is a single-page shell (index.html); real paths are /assets/*, /js/*, etc.

# Headers for security (all free)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
